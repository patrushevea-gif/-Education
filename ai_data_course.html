<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Data Course</title>
  <style>
    :root {
      --navy: #0D1B2A;
      --navy2: #1A2E45;
      --gold: #C9A84C;
      --light: #EDF2F7;
      --muted: #8A9BBD;
      --sky: #3A7BD5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'PT Sans', Arial, sans-serif;
      background: radial-gradient(ellipse at 20% 10%, rgba(58,123,213,0.15), transparent 50%), var(--navy);
      color: var(--light);
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(26,46,69,0.75);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      padding: 32px;
      line-height: 1.65;
    }
    h1 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 2rem;
      font-family: 'Playfair Display', Georgia, serif;
    }
    p { color: var(--muted); margin: 0 0 10px; }
    .btn {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 6px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--sky), #2C5282);
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AI Data Course</h1>
    <p>Модуль успешно подключен к стартовой странице учебного центра.</p>
    <p>Контент курса можно заменить на финальную версию без изменений навигации.</p>
    <a class="btn" href="index.html">← Вернуться на стартовую страницу</a>
  </main>
</body>
</html>
